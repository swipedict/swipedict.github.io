    <!-- Apply saved theme before first paint — prevents flash -->
    <script>
      (function(){
        var t = localStorage.getItem('theme');
        if (t === 'light') document.documentElement.classList.remove('dark');
        // default is dark (class already on <html>)
      })();
    </script>

    <!-- GitHub Pages SPA: restore path from redirect query param -->
    <script>
      (function(){
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          window.history.replaceState(null, null, decodeURIComponent(p[1]) + window.location.hash);
        }
      })();
    </script>
